<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desain Web OX-Lab</title>
    <!-- Menggunakan Tailwind CSS untuk styling yang responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menggunakan Google Fonts agar mendekati referensi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth; /* Scroll mulus */
        }
        
        /* Gradient mengikuti palet warna referensi: Pink Pucat ke Biru Tua */
        .gradient-bg {
            background: linear-gradient(180deg, #D6A6C0 0%, #4A72C2 50%, #2E3A8C 100%);
        }

        /* Menghaluskan tampilan font untuk branding */
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- ========================================= -->
    <!-- TAMPILAN AWAL (HERO) - TANPA LINGKARAN -->
    <!-- ========================================= -->
    <section id="beranda" class="gradient-bg relative min-h-screen flex flex-col justify-between overflow-hidden">
        
        <!-- BAGIAN ATAS: LOGO DAN BRANDING -->
        <div class="pt-8 px-6 md:pt-10 md:px-10 flex justify-between items-center z-20">
            
            <!-- Logo Kotak di Kiri Atas -->
            <div class="w-28 h-14 md:w-36 md:h-16 bg-white/30 backdrop-blur-md border border-white/40 shadow-lg flex items-center justify-center rounded-xl p-2 gap-3">
                <div class="w-1/2 h-full flex items-center justify-center">
                    <img src="image/logo-ui.png" alt="Logo Instansi" class="max-h-full object-contain">
                </div>
                <div class="w-px h-2/3 bg-white/50"></div>
                <div class="w-1/2 h-full flex items-center justify-center">
                    <img src="image/logo OX-Lab.png alt="OX Lab" class="max-h-full object-contain">
                </div>
            </div>

            <!-- Ikon Beruang di Kanan Atas -->
            <div class="flex items-center">
                <img src="image/logo-polar.png" alt="Bear Icon" class="w-18 h-18 md:w-12 md:h-12 object-contain drop-shadow-md opacity-90">
            </div>

        </div>

        <!-- BAGIAN TENGAH: LOGO UTAMA SAJA -->
        <div class="flex-grow flex flex-col items-center justify-center z-10 text-center px-4">
            
            <!-- AREA LOGO TENGAH (LINGKARAN DIHAPUS) -->
            <div class="relative group transform hover:scale-105 transition duration-500 ease-in-out">
                <!-- Ikon Logo OX-Lab Putih (Dibuat besar langsung tanpa bingkai) -->
                <!-- Ukuran disesuaikan agar tetap dominan di tengah layar -->
                <img src="image/7fecb108-1b64-42f5-bd89-6a237e50457e-removebg-preview 1.png" alt="OX-Logo Utama" class="w-64 h-64 md:w-[480px] md:h-[480px] object-contain filter drop-shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
            </div>

        </div>

        <!-- BAGIAN BAWAH: TOMBOL "CLICK FOR MORE!" -->
        <div class="pb-16 flex justify-center z-10 px-4">
            <button onclick="scrollToNext()" class="flex flex-col items-center gap-2 focus:outline-none">
                <!-- Bubble Text Putih -->
                <div class="px-12 py-4 bg-white text-[#2E3A8C] rounded-full shadow-2xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-lg active:scale-95">
                    <span class="text-base md:text-lg font-bold tracking-wide">Click for more!</span>
                </div>
            </button>
        </div>
        
    </section>

    <!-- SECTION 2: HALAMAN KONTEN -->
    <section id="konten" class="min-h-screen flex flex-col bg-black text-white">
        <div class="py-20 px-8 md:px-16 text-center max-w-4xl mx-auto">
            <h2 class="text-3xl md:text-5xl font-bold mb-6 text-indigo-300">Tentang OX-Lab</h2>
            <p class="text-gray-400 text-lg md:text-xl leading-relaxed">
                Elemen lingkaran biru 3D telah dihapus. Logo sekarang tampil minimalis dengan efek bayangan (drop-shadow) agar tetap memiliki kedalaman di atas gradasi background.
            </p>
        </div>
        <div class="pb-20 text-center">
            <button onclick="scrollToTop()" class="px-8 py-4 bg-white/10 text-white rounded-full font-semibold hover:bg-white/20 transition shadow-lg border border-white/20">
                Kembali ke Atas
            </button>
        </div>
    </section>

    <script>
        function scrollToNext() {
            const contentSection = document.getElementById('konten');
            if (contentSection) {
                contentSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function scrollToTop() {
            const heroSection = document.getElementById('beranda');
            if (heroSection) {
                heroSection.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
